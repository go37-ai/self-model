# Model and hardware configuration for self-reification experiments.
#
# Usage: select a profile ("local" or "cloud") and a model ("qwen" or "llama")
# when running experiment scripts. The profile determines dtype and quantization;
# the model determines architecture-specific settings.
#
# Local runs use quantized Qwen 2.5-7B for DEBUGGING ONLY — quantized
# activations may not faithfully represent directions in the full-precision model.
# Cloud runs use Qwen3-32B and Llama-3.3-70B, matching the models used in the
# Assistant Axis paper (Lu et al., 2026) so we can reuse their pre-extracted vectors.

profiles:
  local:
    device: cuda
    dtype: float16
    quantize: true       # 4-bit via bitsandbytes
    max_batch_size: 4
  cloud:
    device: cuda
    dtype: bfloat16
    quantize: false
    max_batch_size: 16

models:
  # Local debugging only — results not publishable
  qwen2:
    name: Qwen/Qwen2.5-7B-Instruct
    num_layers: 28
    hidden_size: 3584
  # Cloud primary — matches assistant-axis paper
  qwen3:
    name: Qwen/Qwen3-32B
    num_layers: 64
    hidden_size: 5120
    target_layer: 32           # from assistant-axis config
    assistant_axis_config: qwen-3-32b/capping_config.pt
  # Cloud 72B — same family as qwen2 for clean scaling comparison
  qwen72:
    name: Qwen/Qwen2.5-72B-Instruct
    num_layers: 80
    hidden_size: 8192
    layer_stride: 4            # record every 4th layer to fit in VRAM
  # Cloud secondary — matches assistant-axis paper (requires HF_TOKEN)
  llama:
    name: meta-llama/Llama-3.3-70B-Instruct
    num_layers: 80
    hidden_size: 8192
    layer_stride: 4            # record every 4th layer to fit in VRAM
    target_layer: 40           # from assistant-axis config
    assistant_axis_config: llama-3.3-70b/capping_config.pt
  # Cloud MoE — Gemma 4 26B A4B (25.2B total / 3.8B active) for cross-architecture
  # extension. Hybrid attention: 24 sliding-window layers (window=1024) + 6 global
  # layers at indices [5, 11, 17, 23, 29] (final layer always global).
  # Top-k=8 of 128 experts per token; record_routing=full stores the entire
  # post-softmax distribution per token per layer for KL / entropy analyses.
  gemma4MoE:
    name: google/gemma-4-26b-a4b-it
    num_layers: 30
    hidden_size: 2816
    # No layer_stride: all 30 layers fit comfortably; total residual-stream
    # storage is well under what Llama-70B costs at stride 4.
    attention_pattern:
      global_layers: [5, 11, 17, 23, 29]
      sliding_window: 1024
    moe:
      num_experts: 128
      top_k_experts: 8
      record_routing: full     # "full" = all 128 post-softmax weights per token
                               # "top_k" = only top-8 IDs + weights (smaller)
                               # null/absent = skip routing capture entirely
    # Gemma 4 ships with a thinking-mode chat template by default. Setting
    # enable_thinking=False suppresses the <|channel>thought scaffolding so
    # the model produces a direct response (comparable to other models'
    # default templates).
    chat_template_kwargs:
      enable_thinking: false

# Layer extraction settings
extraction:
  # Extract at all layers by default; select best by split-half reliability
  all_layers: true
  # Number of random splits for split-half reliability estimation
  n_splits: 100

# Activation recording settings
activation:
  # Which token position(s) to record activations from during response generation.
  # Options: "last" (last token of response), "mean" (mean over response tokens)
  token_position: last
